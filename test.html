<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../log--in.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <div class="foot-1">
            <a href="../index.html">
              <div class="foot-1-2">
                <img
                  class="logo-bg"
                  src="../Assets/icons/icons8-dashboard-layout-48.png"
                  alt="logo"
                />
              </div>
            </a>
            <a href="../index.html">
              <div class="foot-1-2-3">WorkBoard</div>
            </a>
          </div>
        </div>

        <h1>Welcome back</h1>
        <p>Enter your credentials to access your workspace</p>
      </div>

      <div class="card">
        <h2 class="sub-0">Login</h2>
        <p class="sub">Choose your preferred login method</p>

        <!-- Social Buttons -->
        <div class="socks">
          <button id="google-btn" class="social-btn google-btn">
            <img src="../Assets/icons/icons8-chrome-48.png" class="icon-img" />
            Google
          </button>

          <button id="github-btn" class="social-btn github-btn">
            <img src="../Assets/icons/icons8-github-64.png" class="icon-img" />
            GitHub
          </button>
        </div>

        <!-- Toast -->
        <div id="toast"></div>

        <!-- Form -->
        <form id="login-form" autocomplete="off">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="allen@example.com"
            required
            autocomplete="off"
          />

          <div class="label-row">
            <label>Password</label>
            <a href="../pages/forgot-pass.html">Forgot password?</a>
          </div>

          <input type="password" id="password" required autocomplete="off" />

          <button type="submit" class="primary">Sign In</button>
        </form>

        <div class="divider-line"></div>

        <p class="bottom">
          Don't have an account?
          <a href="./sign-up.html">Sign up</a>
        </p>
      </div>
    </div>

    <!-- SCRIPT -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAem227DiziypXlJpa1FCqzvAH-gD0K750",
        authDomain: "workboard-fdf84.firebaseapp.com",
        projectId: "workboard-fdf84",
        appId: "1:412387128397:web:f3e5701388b90425831804",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Toast
      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 2000);
      }

      // Email login
      const form = document.getElementById("login-form");

        form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // 🚫 STOP if fields are empty (prevents auto-submit issue)
  if (!email || !password) {
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    console.log("Logged in:", userCredential.user);
    showToast("Login successful");

    setTimeout(() => {
      window.location.href = "../index.html";
    }, 1000);

  } catch (error) {
    let message = "Login failed. Please try again.";

    switch (error.code) {
      case "auth/wrong-password":
        message = "Incorrect password.";
        break;
      case "auth/user-not-found":
        message = "No account found.";
        break;
      case "auth/invalid-email":
        message = "Invalid email.";
        break;
      case "auth/too-many-requests":
        message = "Too many attempts. Try later.";
        break;
    }

    showToast(message);
  }
});


// Google (Coming Soon)
document.getElementById("google-btn").addEventListener("click", () => {
  showToast("Google sign-in coming soon");
});

// GitHub (Coming Soon)
document.getElementById("github-btn").addEventListener("click", () => {
  showToast("GitHub sign-in coming soon");
});
    </script>
  </body>
</html>
