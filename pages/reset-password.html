<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../forgot--pass.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="foot-1">
        <a href="../index.html">
          <div class="foot-1-2">
            <img
              class="logo-bg"
              src="../Assets/icons/icons8-dashboard-layout-48.png"
              alt="pre-designed logo"
            />
          </div>
        </a>
        <a href="../index.html"> <div class="foot-1-2-3">WorkBoard</div></a>
      </div>
      <form id="reset-form" class="auth-card">
        <!-- HEADER SECTION -->
        <div class="auth-header">
          <h2>Reset Password</h2>
          <p class="auth-subtext">
            Enter a new password for your account.
          </p>
        </div>

        <!-- INPUT -->
        <label>New Password</label>
        <input
          type="password"
          id="reset-password"
          placeholder="Enter new password"
          required
        />

         <label>Re-enter Password</label>
        <input
          type="password"
          id="reset-password-confirm"
          placeholder="Re-enter new password"
          required
        />

        <!-- BUTTON -->
        <button type="submit">Reset Password</button>
        <div class="card-line"></div>
        <div class="auth-footer">
          <p class="bottom">Back to <a href="./log-in.html">Login</a></p>
        </div>
      </form>
    </div>

    <p id="message"></p>
    <script>
        document.getElementById("message").textContent = "Password reset successful!";
    </script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    confirmPasswordReset
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAem227DiziypXlJpa1FCqzvAH-gD0K750",
    authDomain: "workboard-fdf84.firebaseapp.com",
    projectId: "workboard-fdf84",
    appId: "1:412387128397:web:f3e5701388b90425831804",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // get reset code from URL
  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get("oobCode");

  const form = document.getElementById("reset-form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const pass = document.getElementById("reset-password").value;
    const confirmPass = document.getElementById("reset-password-confirm").value;

    if (!pass || pass !== confirmPass) {
      alert("Passwords do not match");
      return;
    }

    try {
      await confirmPasswordReset(auth, oobCode, pass);

      alert("Password reset successful!");

      window.location.href = "./log-in.html";

    } catch (error) {
      console.log(error);
      alert("Invalid or expired reset link.");
    }
  });
</script>

     

  </body>
</html>
