<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../forgot--pass.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="foot-1">
        <a href="../index.html">
          <div class="foot-1-2">
            <img
              class="logo-bg"
              src="../Assets/icons/icons8-dashboard-24.png"
              alt="pre-designed logo"
            />
          </div>
        </a>
        <a href="../index.html"> <div class="foot-1-2-3">FlowZard</div></a>
      </div>
      <form id="reset-form" class="auth-card">
        <!-- HEADER SECTION -->
        <div class="auth-header">
          <h2>Reset Password</h2>
          <p class="auth-subtext">Enter a new password for your account.</p>
        </div>

        <!-- INPUT -->
        <label>New Password</label>
        <div style="position: relative;">
          <input
            type="password"
            id="reset-password"
            placeholder="Enter new password"
            required
            style="padding-right: 40px; box-sizing: border-box; width: 100%;"
          />
          <svg class="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; width: 20px; height: 20px; opacity: 0.6; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;" viewBox="0 0 24 24">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </div>

        <label>Re-enter Password</label>
        <div style="position: relative;">
          <input
            type="password"
            id="reset-password-confirm"
            placeholder="Re-enter new password"
            required
            style="padding-right: 40px; box-sizing: border-box; width: 100%;"
          />
          <svg class="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; width: 20px; height: 20px; opacity: 0.6; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;" viewBox="0 0 24 24">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </div>

        <!-- BUTTON -->
        <button type="submit">Reset Password</button>
        <div class="card-line"></div>
        <div class="auth-footer">
          <p class="bottom">Back to <a href="./log-in.html">Login</a></p>
        </div>
      </form>
    </div>
    
    <p id="message" class="form-message"></p>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        confirmPasswordReset,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAem227DiziypXlJpa1FCqzvAH-gD0K750",
        authDomain: "FlowZard-fdf84.firebaseapp.com",
        projectId: "FlowZard-fdf84",
        appId: "1:412387128397:web:f3e5701388b90425831804",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // get reset code from URL
      const params = new URLSearchParams(window.location.search);
      const oobCode = params.get("oobCode");

      const form = document.getElementById("reset-form");
const btn = form.querySelector("button");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const pass = document.getElementById("reset-password").value;
  const confirmPass = document.getElementById("reset-password-confirm").value;

  message.textContent = "";
  message.className = "form-message";

  if (!pass || pass !== confirmPass) {
    message.textContent = "Passwords do not match";
    message.classList.add("error");
    return;
  }

  try {
    btn.disabled = true;
    btn.textContent = "Resetting...";

    await confirmPasswordReset(auth, oobCode, pass);

    message.textContent = "Password updated successfully!";
    message.classList.add("success");

    btn.textContent = "Redirecting...";

    setTimeout(() => {
      window.location.href = "./log-in.html";
    }, 2000);

  } catch (error) {
    console.log(error);

    message.textContent = "Reset link is invalid or expired.";
    message.classList.add("error");

    btn.disabled = false;
    btn.textContent = "Reset Password";
  }
});

// PASSWORD VISIBILITY TOGGLE
document.querySelectorAll('.toggle-password').forEach(icon => {
  icon.addEventListener('click', function() {
    const input = this.previousElementSibling;
    if (input.type === 'password') {
      input.type = 'text';
      this.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    } else {
      input.type = 'password';
      this.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    }
  });
});
    </script>
  </body>
</html>
