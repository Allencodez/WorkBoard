<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../log--in.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <div class="foot-1">
            <a href="../index.html">
              <div class="foot-1-2">
                <img
                  class="logo-bg"
                  src="../Assets/icons/icons8-dashboard-24.png"
                  alt="logo"
                />
              </div>
            </a>
            <a href="../index.html">
              <div class="foot-1-2-3">FlowZard</div>
            </a>
          </div>
        </div>

        <h1>Welcome back</h1>
        <p>Enter your credentials to access your workspace</p>
      </div>

      <div class="card">
        <h2 class="sub-0">Login</h2>
        <p class="sub">Choose your preferred login method</p>

        <!-- Social Buttons -->
        <div class="socks">
          <button id="google-btn" class="social-btn google-btn">
            <img src="../Assets/icons/icons8-chrome-48.png" class="icon-img" />
            Google
          </button>

          <button id="github-btn" class="social-btn github-btn">
            <img src="../Assets/icons/icons8-github-64.png" class="icon-img" />
            GitHub
          </button>
        </div>

        <!-- Toast -->
        <div id="toast"></div>

        <!-- Form -->
        <form id="login-form" autocomplete="off">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="allen@example.com"
            required
            autocomplete="off"
          />

          <div class="label-row">
            <label>Password</label>
            <a href="../pages/forgot-pass.html">Forgot password?</a>
          </div>

          <input type="password" id="password" required autocomplete="off" />

          <button type="submit" class="primary">Sign In</button>
        </form>

        <div class="divider-line"></div>

        <p class="bottom">
          Don't have an account?
          <a href="./sign-up.html">Sign up</a>
        </p>
      </div>
    </div>

    <!-- SCRIPT -->
    <script type="module" src="../scripts/auth.js"></script>
  </body>
</html>
