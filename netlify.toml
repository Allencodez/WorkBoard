[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self' https://www.gstatic.com https://www.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com; script-src 'self' https://www.gstatic.com https://www.googleapis.com; connect-src 'self' https://www.gstatic.com https://www.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://*.firebaseio.com; img-src 'self' data: https:;"
